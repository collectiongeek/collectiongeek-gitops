apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-observability
  namespace: argocd
  annotations:
    # Pair ServerSideApply with SSA-based diffing. Argo's legacy diff relies on
    # the last-applied annotation that SSA no longer writes, so it can't tell
    # API-server-defaulted fields (e.g. ESO's remoteRef schema defaults on
    # grafana-admin) from real drift — the app sat perpetually OutOfSync and
    # selfHeal re-synced it in a loop. Deliberately NOT IncludeMutationWebhook:
    # our drift is schema defaulting (covered by the SSA dry-run itself), and
    # that flag widens the ServerSideDiff API's exposure of Secret data
    # (GHSA-3v3m-wc6v-x4x3 — patched in our 3.4.3, but no reason to carry it).
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/collectiongeek/collectiongeek-gitops.git
    targetRevision: main
    path: platform/observability
    helm:
      valueFiles:
        - values.yaml
        - values-test.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      # kube-prometheus-stack CRDs exceed the annotation size limit that
      # client-side apply relies on; SSA is the supported path.
      - ServerSideApply=true

    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
