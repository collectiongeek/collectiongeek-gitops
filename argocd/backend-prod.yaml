apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/collectiongeek/collectiongeek-gitops.git
    # Follow-up #23: prod pins an immutable SHA, so a sync can only ever
    # deploy what the promotion PR showed. Promote = bump this SHA (the PR
    # diff links the exact changeset), merge, `kubectl apply` this file,
    # then manual sync. Rollback = revert the promotion PR and repeat.
    targetRevision: 46a22cf3c4a7dab87e94df16a22f18038bd4d65e
    path: charts/backend
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml

  destination:
    # Replace with your production cluster API server URL
    server: https://kubernetes.default.svc
    namespace: app

  syncPolicy:
    # No automated sync — production deploys are manual
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m