apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/collectiongeek/collectiongeek-gitops.git
    targetRevision: main
    path: charts/frontend
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml

  destination:
    # Replace with your production cluster API server URL
    server: https://kubernetes.default.svc
    namespace: app

  syncPolicy:
    # No automated sync — production deploys are manual
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m