# Grafana admin — always present (Terraform generates the value in infra
# module observability/secrets.tf and ESO syncs it here at runtime).
#
# The Slack-webhook ExternalSecret is INTENTIONALLY OMITTED. Its source in
# AWS Secrets Manager (`observability/slack-webhook`) is created
# conditionally by Terraform, only when `observability_slack_webhook_url`
# is set. Add the slack-webhook ExternalSecret block to this file (or as a
# sibling slack-webhook.externalsecret.yaml) at the same time you enable
# alerting in Phase 1 — see Phase 0 §0.7 for the exact YAML.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: grafana-admin }
  data:
    - secretKey: admin-user
      remoteRef: { key: observability/grafana-admin, property: admin-user }
    - secretKey: admin-password
      remoteRef: { key: observability/grafana-admin, property: admin-password }
