# Test environment overrides

# Flip to true TOGETHER WITH the commented alertmanager block below when
# enabling Slack for test. Prerequisite: the AWS-side secret exists (infra:
# OBSERVABILITY_SLACK_WEBHOOK_URL Environment secret applied). Phase 1 §1.7.
slackWebhook:
  enabled: true

# Flip to true AFTER the backend chart has metrics.enabled=true and the
# backend target shows UP in Prometheus. Phase 1 §1.5–1.6.
backendMonitoring:
  enabled: true

# Portal SSO §S.4: sync the WorkOS client secret for Grafana (see the
# grafana envFromSecret + auth.generic_oauth block below).
grafanaOidc:
  enabled: true

# Phase 4 §4.5: uptime probes + alert rules (the blackbox exporter itself is
# enabled at the bottom of this file).
uptime:
  enabled: true
  targets:
    # This env's public doors, exercised through the full user path
    # (Route53 → NLB → ingress-nginx → TLS → pod):
    - https://app.test.collectiongeek.app/
    - https://api.test.collectiongeek.app/healthz
    - https://grafana.test.collectiongeek.app/
    - https://argocd.test.collectiongeek.app/
    # Cross-env vantage (§4.1): prod's user-facing URLs probed from HERE,
    # because prod can't be trusted to report its own death. Alerts for
    # these arrive via the TEST Slack channel — that's the point.
    - https://app.collectiongeek.app/
    - https://api.collectiongeek.app/healthz
    # DRILL (§4.8 step 3) — cannot resolve, probe_success goes 0, ProbeFailed
    # fires to Slack in ~4 min. REVERT this line once the alert is seen.
    - https://down.test.collectiongeek.app/

# Phase 4 §4.6: the dead-man's switch. Prerequisite: the AWS-side secret
# exists (infra: HEALTHCHECKS_PING_URL Environment secret applied) — same
# rule as slackWebhook above.
healthchecksPing:
  enabled: true

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 1536Mi

  # ---------------------------------------------------------------------
  # SLACK ALERTING — uncomment when enabling Slack (with slackWebhook above).
  # ---------------------------------------------------------------------
  alertmanager:
    alertmanagerSpec:
      # Mounts the ESO-synced Secrets at
      # /etc/alertmanager/secrets/<secret-name>/
      secrets:
        - alertmanager-slack-webhook
        - alertmanager-healthchecks-ping # Phase 4 §4.6 (healthchecksPing above)
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ["namespace", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: slack
        routes:
          # Watchdog fires ALWAYS — that is its job. Phase 4 §4.6: every
          # notification is a heartbeat to healthchecks.io, which alarms when
          # they STOP (check period 10m + grace 10m vs pings every 5m ⇒ an
          # email within ~20 min of the alerting pipeline dying). The fast
          # repeat_interval is deliberate: no human receives these — each
          # repeat is a heartbeat, and two pings per check period mean one
          # dropped webhook doesn't trip the alarm.
          - receiver: healthchecks
            matchers:
              - alertname = "Watchdog"
            group_wait: 0s
            group_interval: 1m
            repeat_interval: 5m
      receivers:
        - name: "null"
        - name: healthchecks
          webhook_configs:
            - url_file: /etc/alertmanager/secrets/alertmanager-healthchecks-ping/url
              send_resolved: false # Watchdog never resolves; if it does,
                # the silence itself is the signal
        - name: slack
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
              channel: "#alerts"
              send_resolved: true

  # ---------------------------------------------------------------------
  # GRAFANA INGRESS (Phase 1 §1.6, enabled 2026-07-07) — same exposure
  # pattern as Argo CD: nginx + cert-manager TLS + external-dns record.
  # Login: WorkOS SSO (Portal SSO §S.4) — password form stays as fallback
  # until §S.5 verification, then gets disabled.
  # ---------------------------------------------------------------------
  grafana:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.test.collectiongeek.app
      tls:
        - hosts:
            - grafana.test.collectiongeek.app
          secretName: grafana-test-tls
    # WorkOS SSO (Portal SSO §S.4): client secret arrives as
    # GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET via the ESO-synced Secret
    # (grafanaOidc.enabled below). Endpoints = this env's AuthKit domain.
    envFromSecret: grafana-oidc
    grafana.ini:
      server:
        root_url: https://grafana.test.collectiongeek.app
      auth.generic_oauth:
        enabled: true
        client_id: client_01KWZKEH86KK7RVW6TKQMH0D4M
        auth_url: https://festive-river-57-staging.authkit.app/oauth2/authorize
        token_url: https://festive-river-57-staging.authkit.app/oauth2/token
        api_url: https://festive-river-57-staging.authkit.app/oauth2/userinfo

# ---------------------------------------------------------------------------
# Loki + Alloy (Phase 2) — logs. Enabled in test first; prod flips after the
# test pipeline is verified end to end (doc §2.7/§2.8).
# ---------------------------------------------------------------------------
loki:
  enabled: true
  serviceAccount:
    name: loki # MUST match the IRSA trust condition (observability:loki)
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::929123273666:role/app-test-loki
  loki:
    storage:
      type: s3
      bucketNames:
        chunks: collectiongeek-app-test-loki-chunks-uswest1
        ruler: collectiongeek-app-test-loki-chunks-uswest1 # unused (no ruler) but required
      s3:
        region: us-west-1
    limits_config:
      # 15d in test — strictly under the bucket's 90d lifecycle backstop.
      retention_period: 360h
  singleBinary:
    resources:
      requests:
        cpu: 150m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

alloy:
  enabled: true
  alloy:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ---------------------------------------------------------------------------
# Tempo (Phase 3) — traces. Enabled in test first; prod flips after the test
# pipeline is verified end to end (doc §3.7/§3.8).
# ---------------------------------------------------------------------------
tempo:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::929123273666:role/app-test-tempo
  tempo:
    storage:
      trace:
        s3:
          bucket: collectiongeek-app-test-tempo-traces-uswest1
          endpoint: s3.us-west-1.amazonaws.com
          region: us-west-1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi

# ---------------------------------------------------------------------------
# Blackbox exporter (Phase 4) — probes the uptime.targets above. §4.5.
# ---------------------------------------------------------------------------
prometheus-blackbox-exporter:
  enabled: true
