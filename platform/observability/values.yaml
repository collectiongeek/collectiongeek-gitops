# Shared values for the platform-observability umbrella chart.
# Env-specific sizing/retention lives in values-test.yaml / values-prod.yaml.

# ---------------------------------------------------------------------------
# Flags consumed by our own templates/ (not by kube-prometheus-stack)
# ---------------------------------------------------------------------------

# Creates the gp3 StorageClass (EBS CSI). Deliberately NOT the cluster
# default; consumers opt in via storageClassName.
storageClass:
  create: true

# Syncs observability/slack-webhook from AWS Secrets Manager into the
# alertmanager-slack-webhook Secret. Flip per-env TOGETHER WITH the Slack
# receiver block in that env's values file — the AWS-side secret must exist
# first (infra: observability_slack_webhook_url), or ESO sits in
# SecretSyncedError and Alertmanager waits on a missing Secret mount.
slackWebhook:
  enabled: false

# Backend dashboard + alert rules. Flip per-env AFTER the backend chart has
# metrics.enabled=true and Prometheus shows the backend target as UP —
# enabling the alerts first would page you about a target that never existed.
backendMonitoring:
  enabled: false

# Syncs observability/grafana-oidc into the grafana-oidc Secret (Portal SSO
# doc §S.4). Flip per-env TOGETHER WITH the kube-prometheus-stack.grafana
# envFromSecret + auth.generic_oauth block in that env's values file — the
# AWS-side secret must exist first (infra: grafana_oidc_client_secret).
grafanaOidc:
  enabled: false

# Uptime Probe + alert rules (Phase 4 §4.5). Flip per-env TOGETHER WITH
# prometheus-blackbox-exporter.enabled (bottom of this file); the target
# list is per-env.
uptime:
  enabled: false
  targets: []

# Syncs observability/healthchecks-ping into the alertmanager-healthchecks-ping
# Secret (Phase 4 §4.6 dead-man's switch). Flip per-env TOGETHER WITH the
# healthchecks receiver block in that env's values file — the AWS-side secret
# must exist first (infra: healthchecks_ping_url), same rule as slackWebhook.
healthchecksPing:
  enabled: false

# In-cluster HMAC-signing forwarder: Alertmanager → AWS DevOps Agent event
# channel (DevOps Agent Alertmanager doc). severity=critical alerts auto-start
# a PAID agent investigation whose findings land in this env's DevOps Agent
# Slack channel; the regular Slack alert keeps flowing either way. Flip
# per-env TOGETHER WITH the devops-agent route/receiver block in that env's
# values file — the AWS-side secret must exist first (infra:
# devops_agent_webhook_url/_secret), same rule as slackWebhook.
devopsAgentForwarder:
  enabled: false
  # Shown in investigation titles so the operator app / Slack post reads
  # "[test] ..." vs "[prod] ..." at a glance (the space is per-account, but
  # titles travel — e.g. screenshots, cross-posted findings).
  environmentLabel: ""

# ---------------------------------------------------------------------------
# kube-prometheus-stack
# ---------------------------------------------------------------------------
kube-prometheus-stack:
  # Short resource names (kps-prometheus, kps-operator, ...) instead of
  # platform-observability-kube-prometheus-stack-*.
  fullnameOverride: kps

  # The bundled community alert rules for Kubernetes itself — node pressure,
  # crashlooping pods, PVCs filling up, Watchdog, etc.
  defaultRules:
    create: true
    rules:
      # Control-plane components EKS does not expose for scraping (below).
      etcd: false
      kubeControllerManager: false
      kubeProxy: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false

  # EKS is a managed control plane: etcd, scheduler, controller-manager and
  # (by default) kube-proxy metrics are unreachable. Leaving these on creates
  # permanently-down targets and false alerts.
  kubeEtcd:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeProxy:
    enabled: false

  prometheusOperator:
    # Admission webhook certs from cert-manager (already a cluster addon)
    # instead of the chart's patch Jobs — plays nicer with Argo CD syncs.
    admissionWebhooks:
      certManager:
        enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  prometheus:
    prometheusSpec:
      # Watch ServiceMonitors/PodMonitors/Probes/Rules in ALL namespaces
      # regardless of helm-release labels — without this, only objects
      # labeled with this release name are picked up.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false
      serviceMonitorNamespaceSelector: {}
      podMonitorNamespaceSelector: {}
      probeNamespaceSelector: {}
      ruleNamespaceSelector: {}

      # TSDB on an encrypted gp3 EBS volume (StorageClass from templates/).
      # Size/retention are per-env; see values-test.yaml / values-prod.yaml.
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  alertmanager:
    enabled: true
    # Until Slack is enabled the chart's default config applies: everything
    # routes to the "null" receiver (plus the Watchdog rule). The full Slack
    # receiver block lives commented in each env values file.
    alertmanagerSpec:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

  grafana:
    fullnameOverride: grafana
    # Login comes from the ESO-synced Secret (Phase 0) — never from a chart
    # value, never from Git.
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    # WorkOS SSO (Portal SSO doc §S.4) — the env-independent half. Each env
    # values file supplies enabled, client_id and the AuthKit-domain URLs,
    # plus envFromSecret for the client secret.
    grafana.ini:
      # §S.5 lock (verified both envs 2026-07-08): WorkOS is the only door.
      # BREAK-GLASS: delete disable_login_form (one-line PR) to restore the
      # password form — the ESO-synced grafana-admin secret still exists.
      auth:
        disable_login_form: true
      auth.generic_oauth:
        name: WorkOS
        scopes: openid profile email
        use_pkce: true
        allow_sign_up: true # creates the Grafana user on first OIDC login;
        # the strict role mapping below is what actually gates entry:
        # app end-users share the WorkOS pool (authenticated != authorized),
        # so exactly one identity maps to admin and EVERYONE ELSE IS DENIED.
        role_attribute_path: "email=='29parsecs.dubious@icloud.com' && 'GrafanaAdmin' || ''"
        role_attribute_strict: true
    # Loki datasource (Phase 2). Grafana talks straight to the loki Service —
    # no gateway (disabled below), no auth (single-tenant, ClusterIP only).
    # Phase 3 adds Tempo, and links the two both ways: Loki's derived field
    # turns the trace_id JSON field into a link to the trace; Tempo's
    # tracesToLogsV2 runs a LogQL query for any span's trace ID.
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        jsonData:
          derivedFields:
            - name: TraceID
              datasourceUid: tempo
              matcherRegex: '"trace_id":"([0-9a-f]+)"'
              url: '${__value.raw}'
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            # Spans and their logs can straddle chunk boundaries — search a
            # window around the span, not just its exact duration.
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            customQuery: true
            query: '{namespace="app", container="backend"} | json | trace_id=`${__span.traceId}`'
    # Stateless on purpose: dashboards are provisioned from ConfigMaps by the
    # sidecar, so losing the pod loses nothing. Ad-hoc edits made in the UI
    # are disposable; anything worth keeping gets exported into Git.
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 500m
        memory: 384Mi

  kube-state-metrics:
    fullnameOverride: kube-state-metrics
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  prometheus-node-exporter:
    fullnameOverride: node-exporter
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# ---------------------------------------------------------------------------
# Loki (Phase 2) — log storage. Chunks + index live in the per-env S3 bucket
# (Phase 0), authenticated via IRSA: the "loki" ServiceAccount name below in
# the env values files IS the credential — it must match the role's trust
# condition (system:serviceaccount:observability:loki). Phase 2 doc §2.4.
# Per-env: enabled flag, bucket, role ARN, retention, sizing.
# ---------------------------------------------------------------------------
loki:
  enabled: false
  fullnameOverride: loki # service is plainly "loki"

  # One process does ingest+store+query. The scalable modes exist for tens of
  # GB/day; two nodes of pod logs is megabytes. Scaling later is a values
  # change (same schema, same bucket), not a migration.
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      storageClass: gp3 # the Phase 1 StorageClass
      size: 10Gi        # WAL + working set only — the chunks live in S3
  # The chart defaults the SimpleScalable trio to >0 replicas and refuses to
  # render two modes at once — zero them explicitly.
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  loki:
    # Single-tenant. Safe for the same reason Prometheus is: ClusterIP only,
    # no Ingress, nothing routes here from outside the cluster.
    auth_enabled: false
    commonConfig:
      replication_factor: 1 # one binary — nobody to replicate to
    schemaConfig:
      configs:
        - from: "2026-07-01" # any date before first ingest
          store: tsdb        # current index format; v13 is its schema
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h
    # The compactor DELETES: it is the retention authority. The bucket's 90d
    # S3 lifecycle rule (Phase 0) is the strictly-longer backstop — never the
    # other way around, or S3 would expire chunks the index still references.
    # retention_period itself is per-env (limits_config in values-{test,prod}).
    compactor:
      retention_enabled: true
      delete_request_store: s3

  # The chart defaults to a fleet: nginx gateway, canary DaemonSet, helm-test
  # pod, two memcached clusters, rules sidecar. All valuable at scale; all
  # dead weight on a two-node cluster. Run exactly one Loki pod, nothing else.
  gateway:
    enabled: false # Grafana talks straight to the loki Service
  lokiCanary:
    enabled: false
  test:
    enabled: false
  chunksCache:
    enabled: false # memcached the chart sizes at GIGABYTES
  resultsCache:
    enabled: false
  sidecar:
    rules:
      enabled: false # no ruler in Phase 2 — log alerts stay in Prometheus

  monitoring:
    serviceMonitor:
      enabled: true # Phase 1's Prometheus scrapes Loki automatically

# ---------------------------------------------------------------------------
# Tempo (Phase 3) — trace storage, single binary. Blocks live in the per-env
# S3 bucket (Phase 0) via IRSA: the "tempo" ServiceAccount name below IS the
# credential (trust condition system:serviceaccount:observability:tempo).
# Per-env: enabled flag, bucket, role ARN, retention override, sizing.
# Doc §3.4.
# ---------------------------------------------------------------------------
tempo:
  enabled: false
  fullnameOverride: tempo # service is plainly "tempo"

  tempo:
    # The chart defaults to -mem-ballast-size-mbs=1024 — a deliberate 1 GiB
    # allocation assuming much larger hosts. With our pod limits that is an
    # instant OOM loop; zero it. (Doc §3.1: read the chart's defaults.)
    memBallastSizeMbs: 0
    reportingEnabled: false # no anonymous usage phone-home
    # Single-tenant, same trust story as Loki's auth_enabled: false —
    # ClusterIP only, nothing routes here from outside the cluster.
    multitenancyEnabled: false
    # Compactor block_retention: the deletion authority, strictly under the
    # bucket's 30d lifecycle backstop (trace_retention_days, Phase 0).
    # 7d here; prod overrides to 14d.
    retention: 168h
    storage:
      trace:
        backend: s3 # bucket/endpoint/region are per-env
        wal:
          path: /var/tempo/wal # on the PVC below
    # NOTE: the chart's Service template hard-wires the Jaeger receiver
    # ports — removing them from tempo.receivers breaks rendering. So Tempo
    # also listens for Jaeger/Zipkin we never send: ClusterIP only, same
    # trust boundary as the OTLP port itself. Accepted, not fought.

  persistence:
    enabled: true
    storageClassName: gp3 # the Phase 1 StorageClass
    size: 10Gi # WAL + working blocks only — traces live in S3

  serviceAccount:
    create: true
    name: tempo # MUST match the IRSA trust condition — see §3.2a

  serviceMonitor:
    enabled: true # Phase 1's Prometheus scrapes Tempo automatically

# ---------------------------------------------------------------------------
# Alloy (Phase 2) — log collector, one per node (DaemonSet). Tails the CRI
# log files kubelet writes under /var/log/pods, attaches WHERE-labels only
# (cardinality!), strips the CRI envelope, pushes to Loki. The backend's JSON
# rides inside the line — parsed at query time, never at ingest. Doc §2.5.
# Phase 3 adds the trace pipeline: receive OTLP from the backend, batch,
# forward to Tempo. Doc §3.5.
# ---------------------------------------------------------------------------
alloy:
  enabled: false
  serviceMonitor:
    enabled: true
  fullnameOverride: alloy # service is plainly "alloy" — the backend sends
    # OTLP to it by DNS name (Phase 3)
  alloy:
    mounts:
      varlog: true # hostPath /var/log — where kubelet writes pod logs
    extraPorts: # OTLP receivers, exposed on the pod and the Service
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
    configMap:
      content: |
        // 1. Ask the API server for the pod inventory.
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // 2. Attach the WHERE-labels (and only those), and compute each
        //    pod's log file path on disk.
        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            action        = "replace"
            replacement   = "/var/log/pods/*$1/*.log"
            target_label  = "__path__"
          }
        }

        // 3. Resolve the globs to actual files ON THIS NODE. Every node's
        //    Alloy discovers every pod but only finds local files — natural
        //    sharding with zero coordination.
        local.file_match "pod_logs" {
          path_targets = discovery.relabel.pod_logs.output
        }

        // 4. Tail them.
        loki.source.file "pod_logs" {
          targets    = local.file_match.pod_logs.targets
          forward_to = [loki.process.pod_logs.receiver]
        }

        // 5. Strip the CRI envelope (timestamp/stream/flags), push. No JSON
        //    parsing at ingest — that happens at query time in LogQL.
        loki.process "pod_logs" {
          stage.cri {}
          forward_to = [loki.write.default.receiver]
        }

        loki.write "default" {
          endpoint {
            url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
          }
        }

        // ---- Traces (Phase 3): receive OTLP, batch, hand to Tempo ----

        // 6. Listen for OTLP from apps — the agent is an outlet, not a
        //    destination (doc §3.1): apps know this endpoint, never Tempo.
        otelcol.receiver.otlp "default" {
          grpc { endpoint = "0.0.0.0:4317" }
          http { endpoint = "0.0.0.0:4318" }
          output {
            traces = [otelcol.processor.batch.default.input]
          }
        }

        // 7. Batch spans into fewer, larger writes — same reason the
        //    app-side SDK batches: chatty small requests are the enemy.
        otelcol.processor.batch "default" {
          output {
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        // 8. Forward to Tempo over OTLP/gRPC. Plaintext in-cluster like
        //    every other observability hop — TLS terminates at the Ingress
        //    boundary; none of this is routable from outside.
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "tempo.observability.svc.cluster.local:4317"
            tls { insecure = true }
          }
        }

# ---------------------------------------------------------------------------
# Blackbox exporter (Phase 4) — uptime probing from the user's vantage point.
# The exporter doesn't probe on its own schedule: each Prometheus scrape of
# /probe?target=<url> IS the probe. The Probe object in templates/ supplies
# the per-env target list. Doc §4.5.
# ---------------------------------------------------------------------------
prometheus-blackbox-exporter:
  enabled: false
  fullnameOverride: blackbox # service is plainly "blackbox" — the Probe
    # object references it by DNS name
  # One module, strict on purpose: HTTPS or it didn't happen. A probe that
  # "succeeded" over plain HTTP would mask a broken TLS setup — the exact
  # failure this phase exists to catch.
  config:
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          preferred_ip_protocol: ip4
          fail_if_not_ssl: true
  serviceMonitor:
    selfMonitor:
      enabled: true # scrape the exporter's own /metrics too
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
