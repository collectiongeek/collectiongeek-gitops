# Production environment overrides

# Flip to true TOGETHER WITH the commented alertmanager block below when
# enabling Slack for prod. Prerequisite: the AWS-side secret exists (infra:
# OBSERVABILITY_SLACK_WEBHOOK_URL Environment secret applied). Phase 1 §1.7.
slackWebhook:
  enabled: true

# Flip to true AFTER the backend chart has metrics.enabled=true and the
# backend target shows UP in Prometheus. Phase 1 §1.5–1.6.
backendMonitoring:
  enabled: true

# Portal SSO §S.4: sync the WorkOS client secret for Grafana (see the
# grafana envFromSecret + auth.generic_oauth block below).
grafanaOidc:
  enabled: true

# Phase 4 §4.5: uptime probes + alert rules (the blackbox exporter itself is
# enabled at the bottom of this file). Enabled after test verified (§4.8):
# both drills passed 2026-07-13.
uptime:
  enabled: true
  targets:
    # This env's public doors, exercised through the full user path
    # (Route53 → NLB → ingress-nginx → TLS → pod). Prod's user-facing pair
    # is ALSO probed from the test cluster (§4.1 — independent vantage).
    - https://app.collectiongeek.app/
    - https://api.collectiongeek.app/healthz
    - https://grafana.collectiongeek.app/
    - https://argocd.collectiongeek.app/

# Phase 4 §4.6: the dead-man's switch. Prerequisite: the AWS-side secret
# exists (infra: HEALTHCHECKS_PING_URL Environment secret applied) — same
# rule as slackWebhook above.
healthchecksPing:
  enabled: true

# DevOps Agent Alertmanager doc §A: severity=critical alerts also wake the
# DevOps Agent (PAID investigation; findings land in
# #collectiongeek-devops-agent-prod). Flipped 2026-07-24 after the test
# drill verified end to end (doc §A.6).
devopsAgentForwarder:
  enabled: true
  environmentLabel: prod

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 40Gi
      resources:
        requests:
          cpu: 300m
          memory: 1536Mi
        limits:
          cpu: "1"
          memory: 2Gi

  # ---------------------------------------------------------------------
  # SLACK ALERTING — uncomment when enabling Slack (with slackWebhook above).
  # ---------------------------------------------------------------------
  alertmanager:
    alertmanagerSpec:
      # Mounts the ESO-synced Secrets at
      # /etc/alertmanager/secrets/<secret-name>/
      secrets:
        - alertmanager-slack-webhook
        - alertmanager-healthchecks-ping # Phase 4 §4.6 (healthchecksPing above)
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ["namespace", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: slack
        routes:
          # Watchdog fires ALWAYS — that is its job. Phase 4 §4.6: every
          # notification is a heartbeat to healthchecks.io, which alarms when
          # they STOP (see values-test.yaml for the commentary on the
          # intervals).
          - receiver: healthchecks
            matchers:
              - alertname = "Watchdog"
            group_wait: 0s
            group_interval: 1m
            repeat_interval: 5m
          # DevOps Agent doc §A: criticals ALSO start a paid investigation
          # (see values-test.yaml for the commentary on continue: true and
          # the deliberate catch-all below).
          - receiver: devops-agent
            matchers:
              - severity = "critical"
            continue: true
            repeat_interval: 24h
          # Catch-all, DELIBERATE: without it, criticals matched above would
          # never fall back to the root receiver and would vanish from Slack.
          - receiver: slack
      receivers:
        - name: "null"
        - name: healthchecks
          webhook_configs:
            - url_file: /etc/alertmanager/secrets/alertmanager-healthchecks-ping/url
              send_resolved: false # Watchdog never resolves; if it does,
                # the silence itself is the signal
        - name: devops-agent
          webhook_configs:
            - url: http://devops-agent-forwarder.observability.svc:8080/alert
              send_resolved: false # investigations are about firing alerts
        - name: slack
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
              channel: "#alerts"
              send_resolved: true

  # ---------------------------------------------------------------------
  # GRAFANA INGRESS (Phase 1 §1.6, enabled 2026-07-07) — same exposure
  # pattern as Argo CD: nginx + cert-manager TLS + external-dns record.
  # Login: WorkOS SSO (Portal SSO §S.4) — password form stays as fallback
  # until §S.5 verification, then gets disabled.
  # ---------------------------------------------------------------------
  grafana:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.collectiongeek.app
      tls:
        - hosts:
            - grafana.collectiongeek.app
          secretName: grafana-prod-tls
    # WorkOS SSO (Portal SSO §S.4): client secret arrives as
    # GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET via the ESO-synced Secret
    # (grafanaOidc.enabled below). Endpoints = this env's AuthKit domain.
    envFromSecret: grafana-oidc
    grafana.ini:
      server:
        root_url: https://grafana.collectiongeek.app
      auth.generic_oauth:
        enabled: true
        client_id: client_01KWZKQEDW7KATZF5PMD30N2Z6
        auth_url: https://polished-paper-76.authkit.app/oauth2/authorize
        token_url: https://polished-paper-76.authkit.app/oauth2/token
        api_url: https://polished-paper-76.authkit.app/oauth2/userinfo

# ---------------------------------------------------------------------------
# Loki + Alloy (Phase 2) — logs. Enabled 2026-07-06 after the test pipeline
# verified end to end (§2.8) and backend e3f6212 (slog) reached prod.
# ---------------------------------------------------------------------------
loki:
  enabled: true
  serviceAccount:
    name: loki # MUST match the IRSA trust condition (observability:loki)
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::590728475829:role/app-prod-loki
  loki:
    storage:
      type: s3
      bucketNames:
        chunks: collectiongeek-app-prod-loki-chunks-uswest1
        ruler: collectiongeek-app-prod-loki-chunks-uswest1 # unused (no ruler) but required
      s3:
        region: us-west-1
    limits_config:
      # 60d in prod — strictly under the bucket's 90d lifecycle backstop.
      retention_period: 1440h
  singleBinary:
    resources:
      requests:
        cpu: 200m
        memory: 768Mi
      limits:
        cpu: 750m
        memory: 1536Mi

alloy:
  enabled: true
  alloy:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ---------------------------------------------------------------------------
# Tempo (Phase 3) — traces. Enabled 2026-07-07 after the test pipeline
# verified end to end (§3.8) and backend 3dba8f2 (otel) reached prod.
# ---------------------------------------------------------------------------
tempo:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::590728475829:role/app-prod-tempo
  tempo:
    # 14d in prod — strictly under the bucket's 30d lifecycle backstop.
    retention: 336h
    storage:
      trace:
        s3:
          bucket: collectiongeek-app-prod-tempo-traces-uswest1
          endpoint: s3.us-west-1.amazonaws.com
          region: us-west-1
    resources:
      requests:
        cpu: 150m
        memory: 384Mi
      limits:
        cpu: 500m
        memory: 768Mi

# ---------------------------------------------------------------------------
# Blackbox exporter (Phase 4) — probes the uptime.targets above. §4.5.
# ---------------------------------------------------------------------------
prometheus-blackbox-exporter:
  enabled: true
