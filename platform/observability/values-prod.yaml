# Production environment overrides

# Flip to true TOGETHER WITH the commented alertmanager block below when
# enabling Slack for prod. Prerequisite: the AWS-side secret exists (infra:
# OBSERVABILITY_SLACK_WEBHOOK_URL Environment secret applied). Phase 1 §1.7.
slackWebhook:
  enabled: true

# Flip to true AFTER the backend chart has metrics.enabled=true and the
# backend target shows UP in Prometheus. Phase 1 §1.5–1.6.
backendMonitoring:
  enabled: true

# Portal SSO §S.4: sync the WorkOS client secret for Grafana (see the
# grafana envFromSecret + auth.generic_oauth block below).
grafanaOidc:
  enabled: true

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 40Gi
      resources:
        requests:
          cpu: 300m
          memory: 1536Mi
        limits:
          cpu: "1"
          memory: 2Gi

  # ---------------------------------------------------------------------
  # SLACK ALERTING — uncomment when enabling Slack (with slackWebhook above).
  # ---------------------------------------------------------------------
  alertmanager:
    alertmanagerSpec:
      # Mounts the ESO-synced Secret at
      # /etc/alertmanager/secrets/alertmanager-slack-webhook/
      secrets:
        - alertmanager-slack-webhook
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ["namespace", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: slack
        routes:
          # Watchdog fires ALWAYS (it proves alerting works); route it away
          # from Slack. Phase 4 turns it into a dead-man's switch.
          - receiver: "null"
            matchers:
              - alertname = "Watchdog"
      receivers:
        - name: "null"
        - name: slack
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
              channel: "#alerts"
              send_resolved: true

  # ---------------------------------------------------------------------
  # GRAFANA INGRESS (Phase 1 §1.6, enabled 2026-07-07) — same exposure
  # pattern as Argo CD: nginx + cert-manager TLS + external-dns record.
  # Login: WorkOS SSO (Portal SSO §S.4) — password form stays as fallback
  # until §S.5 verification, then gets disabled.
  # ---------------------------------------------------------------------
  grafana:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.collectiongeek.app
      tls:
        - hosts:
            - grafana.collectiongeek.app
          secretName: grafana-prod-tls
    # WorkOS SSO (Portal SSO §S.4): client secret arrives as
    # GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET via the ESO-synced Secret
    # (grafanaOidc.enabled below). Endpoints = this env's AuthKit domain.
    envFromSecret: grafana-oidc
    grafana.ini:
      server:
        root_url: https://grafana.collectiongeek.app
      auth.generic_oauth:
        enabled: true
        client_id: client_01KWZKQEDW7KATZF5PMD30N2Z6
        auth_url: https://polished-paper-76.authkit.app/oauth2/authorize
        token_url: https://polished-paper-76.authkit.app/oauth2/token
        api_url: https://polished-paper-76.authkit.app/oauth2/userinfo

# ---------------------------------------------------------------------------
# Loki + Alloy (Phase 2) — logs. Enabled 2026-07-06 after the test pipeline
# verified end to end (§2.8) and backend e3f6212 (slog) reached prod.
# ---------------------------------------------------------------------------
loki:
  enabled: true
  serviceAccount:
    name: loki # MUST match the IRSA trust condition (observability:loki)
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::590728475829:role/app-prod-loki
  loki:
    storage:
      type: s3
      bucketNames:
        chunks: collectiongeek-app-prod-loki-chunks-uswest1
        ruler: collectiongeek-app-prod-loki-chunks-uswest1 # unused (no ruler) but required
      s3:
        region: us-west-1
    limits_config:
      # 60d in prod — strictly under the bucket's 90d lifecycle backstop.
      retention_period: 1440h
  singleBinary:
    resources:
      requests:
        cpu: 200m
        memory: 768Mi
      limits:
        cpu: 750m
        memory: 1536Mi

alloy:
  enabled: true
  alloy:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ---------------------------------------------------------------------------
# Tempo (Phase 3) — traces. Enabled 2026-07-07 after the test pipeline
# verified end to end (§3.8) and backend 3dba8f2 (otel) reached prod.
# ---------------------------------------------------------------------------
tempo:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::590728475829:role/app-prod-tempo
  tempo:
    # 14d in prod — strictly under the bucket's 30d lifecycle backstop.
    retention: 336h
    storage:
      trace:
        s3:
          bucket: collectiongeek-app-prod-tempo-traces-uswest1
          endpoint: s3.us-west-1.amazonaws.com
          region: us-west-1
    resources:
      requests:
        cpu: 150m
        memory: 384Mi
      limits:
        cpu: 500m
        memory: 768Mi
