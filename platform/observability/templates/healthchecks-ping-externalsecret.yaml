{{- if .Values.healthchecksPing.enabled }}
# Dead-man's-switch ping URL (Phase 4 §4.6). Enable only once the AWS-side
# secret exists (infra: healthchecks_ping_url) — otherwise ESO reports
# SecretSyncedError and the Alertmanager pod waits on a Secret that never
# materializes. Alertmanager consumes it as a file mount (url_file), so the
# capability URL itself never appears in its config or in Git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: healthchecks-ping
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: alertmanager-healthchecks-ping }
  data:
    - secretKey: url
      remoteRef: { key: observability/healthchecks-ping, property: url }
{{- end }}
