{{- if .Values.grafanaOidc.enabled }}
# Grafana's WorkOS OAuth client secret (Portal SSO doc §S.4). Enable only once
# the AWS-side secret exists (infra: grafana_oidc_client_secret) — otherwise
# ESO reports SecretSyncedError and Grafana's envFromSecret waits on a Secret
# that never materializes. The key IS the GF_* env var name, so envFromSecret
# drops it straight into Grafana's environment — the secret never appears in
# grafana.ini or in Git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: grafana-oidc }
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef: { key: observability/grafana-oidc, property: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET }
{{- end }}
