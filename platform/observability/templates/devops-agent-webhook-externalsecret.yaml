{{- if .Values.devopsAgentForwarder.enabled }}
# DevOps Agent event-channel webhook credentials (DevOps Agent Alertmanager
# doc §A.4). Enable only once the AWS-side secret exists (infra:
# devops_agent_webhook_url/_secret) — otherwise ESO reports SecretSyncedError
# and the forwarder pod waits on a Secret that never materializes. The
# forwarder consumes both keys as file mounts and re-reads them per request,
# so neither the capability URL nor the HMAC secret ever appears in its
# config, in Git, or in a pod env var.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: devops-agent-webhook
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: devops-agent-webhook }
  data:
    - secretKey: url
      remoteRef: { key: observability/devops-agent-webhook, property: url }
    - secretKey: secret
      remoteRef: { key: observability/devops-agent-webhook, property: secret }
{{- end }}
