# Grafana admin — always present (Terraform generates the value in infra
# module observability/secrets.tf and ESO syncs it here at runtime).
#
# The Slack-webhook ExternalSecret lives in slack-webhook-externalsecret.yaml,
# gated by .Values.slackWebhook.enabled — its source in AWS Secrets Manager
# (`observability/slack-webhook`) only exists once Terraform's
# `observability_slack_webhook_url` is set, so it stays off until you enable
# alerting (Phase 1 §1.7).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: grafana-admin }
  data:
    - secretKey: admin-user
      remoteRef: { key: observability/grafana-admin, property: admin-user }
    - secretKey: admin-password
      remoteRef: { key: observability/grafana-admin, property: admin-password }
