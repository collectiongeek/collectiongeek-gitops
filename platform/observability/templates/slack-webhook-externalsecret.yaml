{{- if .Values.slackWebhook.enabled }}
# Alertmanager Slack webhook. Enable only once the AWS-side secret exists
# (infra: observability_slack_webhook_url) — otherwise ESO reports
# SecretSyncedError and the Alertmanager pod waits on a Secret that never
# materializes. Alertmanager consumes it as a file mount (api_url_file), so
# the webhook URL itself never appears in its config or in Git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: slack-webhook
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secretsmanager, kind: ClusterSecretStore }
  target: { name: alertmanager-slack-webhook }
  data:
    - secretKey: url
      remoteRef: { key: observability/slack-webhook, property: url }
{{- end }}
