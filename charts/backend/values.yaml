# -- Number of replicas (ignored if autoscaling is enabled)
replicaCount: 1

image:
  repository: ghcr.io/collectiongeek/backend
  tag: "" # always set per-env (values-test/values-prod); the template enforces it
  pullPolicy: IfNotPresent
  # pullSecret: ghcr-pull-secret  # Only needed if GHCR packages are private

# -- Environment variables injected into the container
env:
  PORT: "8080"
  CORS_ALLOWED_ORIGINS: ""
  # CONVEX_DEPLOY_URL: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Prometheus scraping (Observability Phase 1). Enabling adds a "metrics"
# container/Service port and a ServiceMonitor — the ServiceMonitor CRD must
# already exist in the cluster (platform-observability synced) or the sync
# fails. Flip per-env: values-test.yaml first, values-prod.yaml at promotion.
metrics:
  enabled: false
  port: 9090

ingress:
  enabled: false
  className: nginx
  host: ""
  annotations: {}
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilization: 80
  targetMemoryUtilization: 80

nameOverride: ""
fullnameOverride: ""