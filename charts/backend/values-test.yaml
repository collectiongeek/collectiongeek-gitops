# Test environment overrides

replicaCount: 1

image:
  repository: ghcr.io/collectiongeek/backend
  tag: 15f2947

env:
  PORT: "8080"
  CORS_ALLOWED_ORIGINS: "https://app.test.collectiongeek.app"
  # CONVEX_DEPLOY_URL: "<your-convex-test-deployment-url>"
secretRef: collectiongeek-secrets

ingress:
  enabled: true
  className: nginx
  host: api.test.collectiongeek.app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - api.test.collectiongeek.app
      secretName: backend-test-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false

# Observability Phase 1 (§1.5): second container port (9090) + METRICS_PORT
# env + ServiceMonitor. The platform-observability stack must already be
# synced (ServiceMonitor CRD) — it is, since 2026-07-05.
metrics:
  enabled: true
