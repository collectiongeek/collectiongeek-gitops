# Production environment overrides

replicaCount: 2

image:
  repository: ghcr.io/collectiongeek/backend
  tag: 20f4c6f

env:
  PORT: "8080"
  CORS_ALLOWED_ORIGINS: "https://app.collectiongeek.app"
  # CONVEX_DEPLOY_URL: "<your-convex-prod-deployment-url>"
  # Observability Phase 3 (§3.5): lights up the backend's dormant tracing.
  # Spans go to the Alloy agent, which batches and forwards to Tempo.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.observability.svc.cluster.local:4318"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=prod"
secretRef: collectiongeek-secrets

ingress:
  enabled: true
  className: nginx
  host: api.collectiongeek.app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - api.collectiongeek.app
      secretName: backend-prod-tls

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 75
  targetMemoryUtilization: 80

# Observability Phase 1 (§1.5): second container port (9090) + METRICS_PORT
# env + ServiceMonitor. The platform-observability stack must already be
# synced (ServiceMonitor CRD) — it is, since 2026-07-05.
metrics:
  enabled: true
