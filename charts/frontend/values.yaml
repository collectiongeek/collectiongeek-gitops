# -- Number of replicas (ignored if autoscaling is enabled)
replicaCount: 1

image:
  repository: ghcr.io/collectiongeek/frontend
  tag: latest
  pullPolicy: IfNotPresent
  # pullSecret: ghcr-pull-secret  # Only needed if GHCR packages are private

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  host: ""
  annotations: {}
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilization: 80
  targetMemoryUtilization: 80

nameOverride: ""
fullnameOverride: ""