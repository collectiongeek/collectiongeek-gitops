# Test environment overrides

replicaCount: 1

image:
  repository: ghcr.io/collectiongeek/frontend
  tag: 6c06571

ingress:
  enabled: true
  className: nginx
  host: app.test.collectiongeek.app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - app.test.collectiongeek.app
      secretName: frontend-test-tls

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false

config:
  apiBaseUrl: "https://api.test.collectiongeek.app"
  workosClientId: "client_01KR4G0N21Q7YDRS6WD7PRTHRX"
  convexUrl: "https://animated-walrus-717.convex.cloud/"