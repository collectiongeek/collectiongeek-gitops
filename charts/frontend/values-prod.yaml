# Production environment overrides

replicaCount: 2

image:
  repository: ghcr.io/collectiongeek/frontend
  tag: 9708f8b

ingress:
  enabled: true
  className: nginx
  host: app.collectiongeek.app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - app.collectiongeek.app
      secretName: frontend-prod-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 75
  targetMemoryUtilization: 80

config:
  apiBaseUrl: "https://api.collectiongeek.app"
  workosClientId: "client_01KR4G0NK1P5K7VJ5P892X9FQZ"
  convexUrl: "https://expert-echidna-324.convex.cloud/"